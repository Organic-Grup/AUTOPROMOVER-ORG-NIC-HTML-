<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Autopromover</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Montserrat',Arial;
background:#0b0f1a;
color:#e5e7eb;
text-align:center;
}

.hero{
padding:60px 20px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 30px;
border-radius:10px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
color:#000;
font-weight:600;
text-decoration:none;
opacity:.5;
pointer-events:none;
}

.btn.active{
opacity:1;
pointer-events:auto;
}

.video-box{
max-width:800px;
margin:30px auto;
}
</style>

</head>

<body>

<div class="hero">

<h1>Transforme Visualizações em Crescimento Real</h1>

<p>Assista o vídeo para liberar o acesso</p>

<h2>🎥 Vídeo 1: Ensinamento</h2>

<div class="video-box">
<iframe 
width="100%" 
height="400"
src="https://www.youtube.com/embed/Muf8pp3ukdc"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<a id="btnEntrar" class="btn" href="https://wa.me/13678903119">
🚀 Liberando acesso...
</a>

<p id="contador"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyCIzJ8ggh1nJozmZEjSUcT9fUedam-7fA",
authDomain:"cronograma-pro-407b4.firebaseapp.com",
databaseURL:"https://cronograma-pro-407b4-default-rtdb.firebaseio.com/",
projectId:"cronograma-pro-407b4"
});

const db = getDatabase(app);

const viewRef = ref(db,"views");

/* CONTADOR */
onValue(viewRef,s=>{
document.getElementById("contador").innerText =
"👁️ Pessoas que visualizaram: " + (s.val() || 0);
});

/* REGISTRA VISITA */
runTransaction(viewRef,(v)=>{
return (v || 0) + 1;
});

/* LIBERA BOTÃO APÓS 30s */
setTimeout(()=>{
let btn = document.getElementById("btnEntrar");
btn.classList.add("active");
btn.innerText = "🚀 Entrar agora";
},30000);

</script>

</body>
</html>
