<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma PRO APP</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;margin-bottom:15px}
input,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{background:cyan;font-weight:bold;cursor:pointer}
.lista{max-height:150px;overflow:auto;background:#0005;padding:10px;border-radius:10px}
.highlight{color:cyan}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Cronograma PRO</h1>

<div class="card">
<h2>Login</h2>
<input id="nome" placeholder="Seu número">
<button onclick="login()">Entrar</button>
<button onclick="logout()">Sair</button>
<p id="user"></p>
</div>

<div class="card">
<h2>Fila</h2>
<div class="lista" id="fila"></div>
<button onclick="rodar()">Próximo Dia</button>
<button onclick="add10()">+10</button>
<button onclick="resetarSistema()">Reset</button>
</div>

<div class="card">
<h2>Status</h2>
<p id="total"></p>
<p id="dias"></p>
<p id="minhaVez"></p>
</div>

<div class="card">
<h2>Lives</h2>
<p id="ativos"></p>
<p id="espera"></p>
</div>

<div class="card">
<h2>Horas</h2>
<p id="horas"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase, ref, set, onValue, update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyCIzJ8ggh1nJozmZEjSUcT9fUedam-7fA",
authDomain:"cronograma-pro-407b4.firebaseapp.com",
databaseURL:"https://cronograma-pro-407b4-default-rtdb.firebaseio.com/",
projectId:"cronograma-pro-407b4"
});

const db = getDatabase(app);

const filaRef=ref(db,"fila");
const usuariosRef=ref(db,"usuarios");

let fila=[];
let usuarios={};

let usuario = Number(sessionStorage.getItem("usuario"))||null;

/* LOGIN */
window.login=()=>{
let n=Number(document.getElementById("nome").value);
if(!n)return;
usuario=n;
sessionStorage.setItem("usuario",n);
render();
};

/* LOGOUT */
window.logout=()=>{
sessionStorage.clear();
usuario=null;
render();
};

/* FIREBASE SAFE SYNC */
onValue(filaRef,s=>{
const val=s.val();
fila = Array.isArray(val) ? val : Object.values(val||{});
render();
});

onValue(usuariosRef,s=>{
usuarios=s.val()||{};
render();
});

/* RENDER ÚNICO (EVITA LOOP) */
function render(){

document.getElementById("fila").innerText=fila.join(", ");

let ativos=fila.slice(0,6);

document.getElementById("ativos").innerText=
ativos.map((a,i)=>`L${i+1}:${a||"-"}`).join(" ");

document.getElementById("espera").innerText=fila.slice(6).join(", ")||"-";

document.getElementById("total").innerText="Total: "+fila.length;

document.getElementById("dias").innerText="Dias: "+Math.ceil(fila.length/6);

if(usuario!==null){

document.getElementById("user").innerText="Logado "+usuario;

document.getElementById("minhaVez").innerText=
ativos.includes(usuario)?"🔥 SUA VEZ":"Aguardando";

if(!usuarios[usuario])usuarios[usuario]={horas:0};

document.getElementById("horas").innerText=
(usuarios[usuario].horas||0)+"h";

}

}

/* RODAR DIA */
window.rodar=()=>{

let ativos=fila.slice(0,6);

ativos.forEach(id=>{
if(!usuarios[id])usuarios[id]={horas:0};
usuarios[id].horas+=6;
});

fila=fila.slice(6).concat(ativos);

set(filaRef,fila);
update(usuariosRef,usuarios);
};

/* ADD */
window.add10=()=>{
let base=fila.length;
for(let i=1;i<=10;i++){
if(!fila.includes(base+i))fila.push(base+i);
}
set(filaRef,fila);
};

/* RESET */
window.resetarSistema=()=>{
set(filaRef,[]);
set(usuariosRef,{});
sessionStorage.clear();
};

</script>

</body>
</html>
