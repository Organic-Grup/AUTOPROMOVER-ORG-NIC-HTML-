<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cronograma PRO</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}
.container { padding:20px; max-width:900px; margin:auto; }
h1 { text-align:center; }

.card {
    background: rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
}

input {
    width:100%; padding:10px; margin-top:10px;
    border-radius:8px; border:none;
}

button {
    padding:10px; margin-top:10px; width:100%;
    border:none; border-radius:10px;
    background:cyan; font-weight:bold; cursor:pointer;
}

.lista {
    max-height:150px;
    overflow:auto;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
}

.highlight { color:cyan; }
</style>

</head>

<body>

<div class="container">

<h1>🚀 Cronograma PRO</h1>

<div class="card">
<h2>🔐 Login</h2>
<input id="nome" placeholder="Seu número (ex: 1, 2, 3...)">
<button onclick="login()">Entrar</button>
<button onclick="logout()">Sair</button>
<p id="user"></p>
</div>

<div class="card">
<h2>👥 Participantes</h2>
<div class="lista" id="fila"></div>

<button onclick="add10()">Simular +10 Pessoas</button>
<button onclick="rodar()">🚀 Simular Próximo Dia</button>
<button onclick="resetarSistema()">🧹 Resetar Sistema</button>
</div>

<div class="card">
<h2>📊 Status Geral</h2>
<p id="total"></p>
<p id="dias"></p>
<p id="minhaVez"></p>
</div>

<div class="card">
<h2>🎥 Lives de Hoje</h2>
<p id="ativos"></p>
<p id="espera"></p>
</div>

<div class="card">
<h2>⏱️ Horas Lives</h2>
<p id="horas"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  update,
  onValue,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCIzJ8ggh1nJozmZEjSUcT9pFuedam-7fA",
  authDomain: "cronograma-pro-407b4.firebaseapp.com",
  databaseURL: "https://cronograma-pro-407b4-default-rtdb.firebaseio.com/",
  projectId: "cronograma-pro-407b4",
  storageBucket: "cronograma-pro-407b4.appspot.com",
  messagingSenderId: "740937794761",
  appId: "1:740937794761:web:dbf86a5f2a574812837918"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// REF
const filaRef = ref(db, "fila");
const usuariosRef = ref(db, "usuarios");

// STATE
let fila = [];
let usuarios = {};
let usuario = sessionStorage.getItem("usuario");
usuario = usuario ? Number(usuario) : null;

/* =========================
   LOGIN / LOGOUT
========================= */
window.login = function () {
  let nome = document.getElementById("nome").value.trim();

  if (nome === "" || isNaN(nome)) {
    alert("Digite apenas números!");
    return;
  }

  usuario = Number(nome);
  sessionStorage.setItem("usuario", usuario);

  atualizarUI();
};

window.logout = function () {
  sessionStorage.removeItem("usuario");
  usuario = null;
  atualizarUI();
};

/* =========================
   FIREBASE REALTIME
========================= */
onValue(filaRef, snap => {
  fila = snap.val() || [];
  atualizarUI();
});

onValue(usuariosRef, snap => {
  usuarios = snap.val() || {};
  atualizarUI();
});

/* =========================
   UI PRINCIPAL
========================= */
function atualizarUI() {

  document.getElementById("fila").innerText = fila.join(", ");

  let total = fila.length;
  let dias = Math.ceil(total / 6);

  document.getElementById("total").innerText = "Total: " + total;
  document.getElementById("dias").innerText = "Ciclo: " + dias + " dias";

  let ativos = fila.slice(0, 6);
  let letras = ["A", "B", "C", "D", "E", "F"];
  let texto = "";

  for (let i = 0; i < 6; i++) {
    texto += `${letras[i]}:${ativos[i] || "-"} `;
  }

  document.getElementById("ativos").innerText = texto;

  let espera = fila.slice(6);
  document.getElementById("espera").innerText =
    "Espera: " + (espera.length ? espera.join(", ") : "-");

  if (usuario !== null) {

    document.getElementById("user").innerText = "Logado: " + usuario;

    if (ativos && ativos.includes(usuario)) {
      document.getElementById("minhaVez").innerHTML =
        "<span class='highlight'>🔥 É SUA VEZ HOJE!</span>";
    } else {
      document.getElementById("minhaVez").innerText = "Aguardando...";
    }

    if (!usuarios[usuario]) {
      usuarios[usuario] = { horas: 0 };
      set(usuariosRef, usuarios); // CORRIGIDO (sem update perigoso)
    }

    document.getElementById("horas").innerText =
      "Você assistiu: " + (usuarios[usuario]?.horas || 0) + "h";
  }
}

/* =========================
   RODAR DIA
========================= */
window.rodar = function () {

  let ativos = fila.slice(0, 6);

  ativos.forEach(id => {
    if (!usuarios[id]) usuarios[id] = { horas: 0 };
    usuarios[id].horas += 6;
  });

  let usados = fila.splice(0, 6);
  fila = fila.concat(usados);

  set(filaRef, fila);
  set(usuariosRef, usuarios);
};

/* =========================
   ADD +10
========================= */
window.add10 = function () {

  let atual = fila.length;

  for (let i = 1; i <= 10; i++) {
    fila.push(atual + i);
  }

  set(filaRef, fila);
};

/* =========================
   RESET
========================= */
window.resetarSistema = function () {
  if (confirm("Resetar sistema?")) {
    set(filaRef, []);
    set(usuariosRef, {});
    sessionStorage.clear();
  }
};

/* =========================
   INICIALIZAÇÃO SEGURA
========================= */
async function iniciarSistema() {
  const snap = await get(filaRef);

  if (!snap.exists()) {
    let inicial = [];
    for (let i = 1; i <= 10; i++) inicial.push(i);
    await set(filaRef, inicial);
  }
}

iniciarSistema();

</script>

</body>
</html>
